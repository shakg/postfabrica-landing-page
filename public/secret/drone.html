<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Drone Shelter — 12m × 6m × 3m</title>
<style>
  html, body { margin:0; padding:0; background:#0a0d12; color:#cfd6e4;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; height:100%; }
  #app { position:fixed; inset:0; }
  #hud { position:fixed; top:10px; left:10px; z-index:5;
    background:rgba(10,13,18,.78); border:1px solid #243044; border-radius:10px;
    padding:10px 14px; font-size:12px; line-height:1.5; max-width:280px;
    backdrop-filter: blur(6px); }
  #hud b { color:#7fb3ff; }
  #hud .row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  #hud button { background:#1a2230; color:#cfd6e4; border:1px solid #2a3a52;
    border-radius:6px; padding:4px 8px; font-size:11px; cursor:pointer; }
  #hud button:hover { background:#243044; }
  #title { position:fixed; top:10px; right:10px; z-index:5; background:rgba(10,13,18,.78);
    border:1px solid #243044; border-radius:10px; padding:8px 12px; font-size:12px; }
  #title b { color:#9bff9b; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:#0a0d12; z-index:10; color:#7fb3ff; font-size:14px; }
  #loading.hidden { display:none; }
</style>
</head>
<body>
<div id="loading">Sahne yükleniyor…</div>
<div id="title"><b>DRONE SHELTER</b> · 12 × 6 × 3 m</div>
<div id="hud">
  <b>Yerleşim</b><br/>
  Sol: Batarya odası (4 m)<br/>
  Orta: Dron deposu (4 m)<br/>
  Sağ: Atölye (4 m)<br/>
  <div class="row">
    <button onclick="setView('iso')">İzometrik</button>
    <button onclick="setView('top')">Üstten</button>
    <button onclick="setView('front')">Ön</button>
    <button onclick="setView('side')">Yan</button>
    <button onclick="setView('cut')">Kesit</button>
  </div>
  <div style="font-size:10px; color:#7a8aa0; margin-top:6px;">Sürükle: döndür · Scroll: yakınlaştır</div>
</div>
<div id="app"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9bb3cc);
scene.fog = new THREE.Fog(0xa8bdd2, 60, 220);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 2;
controls.maxDistance = 80;
controls.target.set(0, 1.4, 0);

// Lighting
scene.add(new THREE.HemisphereLight(0xbfd6ff, 0x4a4a3a, 0.6));
const sun = new THREE.DirectionalLight(0xffe9c2, 2.2);
sun.position.set(28, 36, 18);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -25; sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25; sun.shadow.camera.bottom = -25;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 120;
sun.shadow.bias = -0.0004; sun.shadow.normalBias = 0.04;
scene.add(sun);
scene.add(new THREE.DirectionalLight(0x8aa6c8, 0.4).translateX(-18).translateY(14).translateZ(-10));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ color: 0x6e7a55, roughness: 0.95 })
);
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
scene.add(ground);

// Materials
const MAT = {
  concrete:   new THREE.MeshStandardMaterial({ color: 0xb8b6ad, roughness: 0.92 }),
  wallExt:    new THREE.MeshStandardMaterial({ color: 0xe5dcc4, roughness: 0.85 }),
  wallInt:    new THREE.MeshStandardMaterial({ color: 0xf2ecdc, roughness: 0.9 }),
  trim:       new THREE.MeshStandardMaterial({ color: 0x2b2e35, roughness: 0.7 }),
  door:       new THREE.MeshStandardMaterial({ color: 0x4a78c8, roughness: 0.45, metalness: 0.5 }),
  glass:      new THREE.MeshPhysicalMaterial({ color: 0xa8c8e8, transmission: 0.7, roughness: 0.05, ior: 1.45, transparent: true, opacity: 0.6 }),
  metal:      new THREE.MeshStandardMaterial({ color: 0x9aa3ad, roughness: 0.4, metalness: 0.8 }),
  metalDark:  new THREE.MeshStandardMaterial({ color: 0x39414c, roughness: 0.5, metalness: 0.7 }),
  wood:       new THREE.MeshStandardMaterial({ color: 0xb7885a, roughness: 0.7 }),
  rack:       new THREE.MeshStandardMaterial({ color: 0x5566cc, roughness: 0.5, metalness: 0.5 }),
  roof:       new THREE.MeshStandardMaterial({ color: 0x4a5560, roughness: 0.55, metalness: 0.4 }),
  ledGreen:   new THREE.MeshStandardMaterial({ color: 0x46e36a, emissive: 0x2a7a3a, emissiveIntensity: 1.4 }),
  battery:    new THREE.MeshStandardMaterial({ color: 0xc23a2b, roughness: 0.5, metalness: 0.3 }),
};

function box(w,h,d, mat, x=0,y=0,z=0){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z); m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}

const W = 12, D = 6, H = 3, halfW = W/2, halfD = D/2, wallT = 0.12, wallY = H/2;

// Foundation
box(W+1.0, 0.18, D+1.0, MAT.concrete, 0, 0.09, 0);

// External walls (4 sides, all solid)
box(W, H, wallT, MAT.wallExt, 0, wallY, +halfD);          // front
box(W, H, wallT, MAT.wallExt, 0, wallY, -halfD);          // back
box(wallT, H, D, MAT.wallExt, -halfW, wallY, 0);          // left
box(wallT, H, D, MAT.wallExt, +halfW, wallY, 0);          // right

// Gable ROOF — proper shed roof: HIGH at front, LOW at back
// (replaces broken inverted gable; single slope, gutters at low side)
{
  const rise = 0.9;            // total height drop from front to back
  const len = W + 0.4;
  const slopeLen = Math.hypot(D + 0.1, rise);
  const g = new THREE.BoxGeometry(len, 0.06, slopeLen);
  const m = new THREE.Mesh(g, MAT.roof);
  // Center of roof slab
  m.position.set(0, H + rise/2, -rise/2 * (D/slopeLen));  // bias toward back
  // Tilt: high edge at +z (front), low edge at -z (back)
  // angle: roof slopes DOWN as we go from front (+z) to back (-z)
  m.rotation.x = -Math.atan2(rise, D);    // negative: front edge up
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  // Fascia boards front (high) and back (low)
  box(len, 0.18, 0.04, MAT.trim, 0, H + rise - 0.09, +halfD + 0.05);
  box(len, 0.18, 0.04, MAT.trim, 0, H - 0.09, -halfD - 0.05);
  box(0.04, 0.18, slopeLen, MAT.trim, -halfW - 0.05, 0, 0);
  box(0.04, 0.18, slopeLen, MAT.trim, +halfW + 0.05, 0, 0);
  // Gutter (low side, back)
  box(len, 0.1, 0.12, MAT.metal, 0, H - 0.12, -halfD - 0.18);
}

// Interior partition walls (3 rooms)
box(wallT, H, D, MAT.wallInt, -2, wallY, 0);
box(wallT, H, D, MAT.wallInt, +2, wallY, 0);

// Interior floor
{
  const f = new THREE.Mesh(
    new THREE.PlaneGeometry(W - wallT*2, D - wallT*2),
    new THREE.MeshStandardMaterial({ color: 0x9a9890, roughness: 0.55 })
  );
  f.rotation.x = -Math.PI/2; f.position.y = 0.182; f.receiveShadow = true;
  scene.add(f);
}

// Interior ceiling
{
  const c = new THREE.Mesh(
    new THREE.PlaneGeometry(W - wallT*2, D - wallT*2),
    new THREE.MeshStandardMaterial({ color: 0xece5d2, roughness: 0.95 })
  );
  c.rotation.x = Math.PI/2; c.position.y = H - 0.001; c.receiveShadow = true;
  scene.add(c);
}

/* ---------- Doors ---------- */
// Main double door (front center)
box(1.0, 2.2, 0.06, MAT.door, -0.55, 1.1, halfD + 0.07);
box(1.0, 2.2, 0.06, MAT.door, +0.55, 1.1, halfD + 0.07);
box(0.08, 2.3, 0.1, MAT.trim, -1.1, 1.15, halfD + 0.04);
box(0.08, 2.3, 0.1, MAT.trim, +1.1, 1.15, halfD + 0.04);
box(2.3, 0.08, 0.1, MAT.trim, 0, 2.26, halfD + 0.04);
// Stoop
box(2.4, 0.15, 0.6, MAT.concrete, 0, 0.075, halfD + 0.32);

// Service door (right side)
box(1.0, 2.1, 0.08, MAT.door, halfW + 0.07, 1.05, -1.0);

// Windows on left side
function win(x){ box(1.2, 1.0, 0.1, MAT.trim, -halfW - 0.06, 1.6, x);
  box(1.1, 0.9, 0.02, MAT.glass, -halfW - 0.12, 1.6, x);
}
win(-4.0); win(-1.5); win(+1.5); win(+4.0);

/* ---------- Sundurma (awning) over front entrance ---------- */
{
  const len = 7.0, depth = 1.8;
  const a = new THREE.Mesh(new THREE.BoxGeometry(len, 0.05, depth), MAT.roof);
  a.position.set(0, 2.5, halfD + depth/2 + 0.15);
  a.rotation.x = -0.18;     // gentle slope down
  a.castShadow = true; a.receiveShadow = true;
  scene.add(a);
  box(0.08, 2.5, 0.08, MAT.metal, -len/2 + 0.1, 1.25, halfD + depth + 0.1);
  box(0.08, 2.5, 0.08, MAT.metal, +len/2 - 0.1, 1.25, halfD + depth + 0.1);
  box(len, 0.05, 0.08, MAT.metal, 0, 2.45, halfD + 0.18);
  // Safety stripe
  for (let i=0; i<10; i++){
    const s = new THREE.Mesh(
      new THREE.BoxGeometry(0.7, 0.005, 0.16),
      new THREE.MeshStandardMaterial({ color: i%2===0 ? 0x111418 : 0xd9b53a })
    );
    s.position.set(-len/2 + 0.35 + i*0.7, 2.48, halfD + depth + 0.13);
    s.rotation.x = -0.18; scene.add(s);
  }
}

/* ---------- Roof OFF for cutaway views ---------- */
const roofParts = [];
scene.traverse(o => { if (o.material === MAT.roof) roofParts.push(o); });
// Hide awning for cutaway too
const awningParts = [];
scene.traverse(o => {
  if (o.material && (o.material.color && o.material.color.getHex() === 0xd9b53a)) awningParts.push(o);
});

/* ---------- Furniture: simple, no over-detailing ---------- */
// Room A (battery, x: -6 to -2)
{
  const cx = -4;
  // 2 safety cabinets
  box(1.2, 1.9, 0.6, MAT.metalDark, cx - 1.0, 0.95, -halfD + 0.36);
  box(1.2, 1.9, 0.6, MAT.metalDark, cx + 1.0, 0.95, -halfD + 0.36);
  // 3 chargers along left wall
  for (let i=0;i<3;i++){
    box(0.4, 1.3, 0.4, MAT.metalDark, -halfW + 0.4, 0.65, -1.5 + i*1.5);
    box(0.3, 0.08, 0.2, MAT.battery, -halfW + 0.4, 1.35, -1.5 + i*1.5);
  }
  // Open shelf (batteries)
  box(1.8, 2.0, 0.45, MAT.metal, cx, 1.0, halfD - 0.7);
  // 4 batteries
  for (let s=0; s<2; s++)
    for (let i=0; i<4; i++)
      box(0.35, 0.12, 0.18, MAT.battery, cx - 0.7 + i*0.42, 0.4 + s*0.6, halfD - 0.6);
}

// Room B (drone storage, x: -2 to +2)
{
  // 3 storage racks
  function rack(x){
    box(1.1, 0.05, 0.7, MAT.rack, x, 0.05, 0);
    for (let s=0; s<5; s++) box(1.05, 0.03, 0.65, MAT.rack, x, 0.4 + s*0.45, 0);
    box(0.04, 2.3, 0.04, MAT.rack, x - 0.52, 1.15, -0.32);
    box(0.04, 2.3, 0.04, MAT.rack, x + 0.52, 1.15, -0.32);
  }
  rack(-1.4); rack(0); rack(+1.4);
  // Simple drone on alternating shelves
  for (let r=0; r<3; r++){
    const rx = -1.4 + r*1.4;
    for (let s=0; s<5; s+=2){
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.1, 0.35), MAT.metalDark);
      g.add(body);
      for (let a=0; a<4; a++){
        const arm = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.02, 0.05), MAT.metalDark);
        arm.rotation.y = a*Math.PI/2; g.add(arm);
      }
      g.position.set(rx, 0.55 + s*0.45, 0);
      g.traverse(o => { if (o.isMesh) { o.castShadow = true; }});
      scene.add(g);
    }
  }
  // 2 prep tables (front)
  for (const x of [-1.0, +1.0]){
    box(1.6, 0.05, 0.8, MAT.wood, x, 0.95, halfD - 1.0);
    box(0.05, 0.95, 0.05, MAT.metal, x - 0.75, 0.475, halfD - 1.35);
    box(0.05, 0.95, 0.05, MAT.metal, x + 0.75, 0.475, halfD - 1.35);
    box(0.05, 0.95, 0.05, MAT.metal, x - 0.75, 0.475, halfD - 0.65);
    box(0.05, 0.95, 0.05, MAT.metal, x + 0.75, 0.475, halfD - 0.65);
    // monitor
    box(0.04, 0.18, 0.04, MAT.metalDark, x, 1.13, halfD - 1.35);
    box(0.5, 0.32, 0.02, new THREE.MeshStandardMaterial({ color: 0x111, emissive: 0x6db1ff, emissiveIntensity: 0.4 }), x, 1.32, halfD - 1.35);
  }
}

// Room C (workshop, x: +2 to +6)
{
  const cx = 4;
  // 4 work desks
  for (const [x, z] of [[+2.7, -1.6], [+2.7, -0.4], [+5.3, -1.6], [+5.3, -0.4]]){
    box(1.7, 0.06, 0.85, MAT.wood, x, 0.92, z);
    for (const dx of [-0.8, +0.8]) for (const dz of [-0.4, +0.4])
      box(0.05, 0.92, 0.05, MAT.metalDark, x + dx, 0.46, z + dz);
    // monitor + ESD mat
    box(1.6, 0.02, 0.8, new THREE.MeshStandardMaterial({ color: 0x2a6dcc, roughness: 0.85 }), x, 0.95, z);
    box(0.04, 0.18, 0.04, MAT.metalDark, x + 0.2, 1.04, z - 0.25);
    box(0.5, 0.32, 0.02, new THREE.MeshStandardMaterial({ color: 0x111, emissive: 0x4080ff, emissiveIntensity: 0.35 }), x + 0.2, 1.30, z - 0.25);
    // chair
    box(0.45, 0.05, 0.45, MAT.metalDark, x, 0.45, z + 0.7);
    box(0.45, 0.5, 0.05, MAT.metalDark, x, 0.72, z + 0.92);
  }
  // 3D printer (back)
  box(0.8, 0.65, 0.55, MAT.metalDark, cx, 1.27, -halfD + 0.9);
  box(0.65, 0.5, 0.005, new THREE.MeshStandardMaterial({ color: 0x111, emissive: 0x46e36a, emissiveIntensity: 0.4 }), cx, 1.25, -halfD + 0.9 + 0.28);
}

/* ---------- AC units (4 outdoor on back wall) ---------- */
for (const x of [-4, -1, +1, +4]){
  box(0.9, 0.35, 0.45, new THREE.MeshStandardMaterial({ color: 0xf2f3f5, roughness: 0.4, metalness: 0.3 }), x, 2.2, -halfD - 0.3);
  box(0.7, 0.25, 0.02, MAT.metalDark, x, 2.2, -halfD - 0.08);
}

/* ---------- Camera presets ---------- */
const VIEWS = {
  iso:   { pos:[14, 9, 18],   target:[0, 1.4, 0] },
  top:   { pos:[0, 28, 0.01], target:[0, 0, 0] },
  front: { pos:[0, 1.7, 16],  target:[0, 1.5, 0] },
  side:  { pos:[20, 4, 0],    target:[0, 1.4, 0] },
  cut:   { pos:[0, 12, 2],    target:[0, 0, 0] },   // top-down cutaway
  back:  { pos:[-20, 4, 0],   target:[0, 1.4, 0] },
};

window.setView = (name) => {
  const p = VIEWS[name]; if (!p) return;
  // Hide roof for cut/top views
  const hide = (name === 'cut' || name === 'top');
  roofParts.forEach(m => m.visible = !hide);
  awningParts.forEach(m => m.visible = !hide);
  camera.position.set(p.pos[0], p.pos[1], p.pos[2]);
  controls.target.set(p.target[0], p.target[1], p.target[2]);
  controls.update();
};

// Default
camera.position.set(14, 9, 18);
controls.update();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let frame = 0;
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  if (frame === 2) document.getElementById('loading').classList.add('hidden');
  frame++;
}
animate();
</script>
</body>
</html>
